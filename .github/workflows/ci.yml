name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build all
        run: npm run build

      - name: Unit tests (shared)
        run: npm run test -w @ticketing/shared

      # --- Integration tests need a real Postgres + Auth: spin up Supabase ---
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (applies migrations + seed)
        run: supabase start

      - name: Export Supabase env
        run: |
          eval "$(supabase status -o env | sed 's/^/export /')"
          {
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SECRET_KEY"
            echo "SUPABASE_ANON_KEY=$PUBLISHABLE_KEY"
          } >> "$GITHUB_ENV"

      - name: Integration tests (api)
        run: npm run test -w @ticketing/api

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
