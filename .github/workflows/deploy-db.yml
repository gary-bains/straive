name: Deploy DB (Supabase migrations)

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-db.yml"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    # Skip (rather than fail) until Supabase is configured. Set the
    # SUPABASE_PROJECT_REF repository variable during setup — see docs/DEPLOYMENT.md.
    if: ${{ vars.SUPABASE_PROJECT_REF != '' }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }}

      - name: Push migrations
        run: supabase db push --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
